name: HIW-500
repo_id: BitRobot/HIW-500-LeRobot
adapter: lerobot
fps: 30
rotation_representation: euler
rotation_euler_order: xyz
position_scale: 0.8
arm_order: [left, right]
calibrated: false
# One shared inspection frame for both audited HIW tasks.  The former per-episode fit changed the
# robot base and scale between hanger and keys; in the hanger window that left the right wrist up
# to 16 cm outside the realizable OpenArm pose.  This convention is fit on episode 7 and reused
# unchanged for episode 10. It keeps the task-window wrist residuals below 9 mm p95 while retaining
# enough arm separation to eliminate the artificial inter-arm collisions seen at smaller scales.
openarm_from_source_base: [0.0208363922, -0.0113709656, -0.1195634269, -0.0174553067, 0.0009214571, 0.0527080555, 0.9984569716]
source_tool_from_openarm_tool:
  right: [0.0, 0.0, 0.0, 0.3419891137, 0.7130408929, -0.2451979516, -0.5607977315]
  left: [0.0, 0.0, 0.0, -0.2808080755, 0.7048304936, 0.2421194771, -0.6047635561]
gripper_mode: normalized
fields:
  pose: observation.state.wbc
  # HIW pose occupies indices 7:19 and needs adapter slicing; use the dedicated HIW preset.
tabletop_tasks: [hang hanger, hang keys]
notes: >-
  The published WBC vector is pivot[0:7], left xyz-rpy[7:13], right xyz-rpy[13:19],
  then left/right trigger+squeeze. G1 root-to-OpenArm root calibration remains required.
