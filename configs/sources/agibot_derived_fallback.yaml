name: AgiBot World Alpha derived EE fallback
repo_id: GT-111/agibotworld-v3-ee
adapter: agibot_lerobot
dataset_prefix: agibot_gripper
fps: 30
rotation_representation: quaternion
quaternion_order: wxyz
position_scale: 1.0
arm_order: [left, right]
calibrated: false
gripper_mode: normalized
fields:
  pose: observation.state
tabletop_tasks: [pick, place, sort, arrange, table]
notes: >-
  Accessible, non-official LeRobot v3 conversion of gated AgiBot World Alpha, configuration
  agibot_gripper. It is a provenance-labelled fallback under CC BY-NC-SA 4.0, not a claim
  that the gated original was downloaded.
