name: AgiBot World Alpha
repo_id: agibot-world/AgiBotWorld-Alpha
adapter: agibot_h5
fps: 30
rotation_representation: quaternion
quaternion_order: xyzw
position_scale: 1.0
arm_order: [left, right]
# CAD-derived G1_120s flange retarget prior. It aligns each gripper's published center
# (+0.100 m along its outward axis) with the OpenArm v2 neutral fingertip contact center
# (-0.16334 m along flange z, with the outward-axis flip). This is exact geometry from
# the cited models, but remains unvalidated until the dataset flange name is metrologically
# confirmed against the physical robot.
source_tool_from_openarm_tool:
  right: [0.0, 0.0014, -0.06334, 0.7071067811865476, 0.7071067811865476, 0.0, 0.0]
  left: [0.0, -0.0014, -0.06334, 0.7071067811865476, -0.7071067811865476, 0.0, 0.0]
calibrated: false
gripper_mode: width_mm
fields:
  timestamp: /timestamp
  position: /state/end/position
  orientation: /state/end/orientation
  gripper: /state/effector/position
tabletop_tasks: [pick, place, sort, arrange]
notes: >-
  Original repository is gated. Published pose is the robot flange, left then right, in
  metres with xyzw quaternion. The configured flange prior is CAD-derived from the official
  GenieSim G1_120s gripper and pinned OpenArm v2 meshes; base/camera metrology is still required.
